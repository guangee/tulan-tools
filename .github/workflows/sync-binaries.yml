name: Sync Binaries

on:
  workflow_call:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync binaries to bin branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Git LFS
        run: git lfs install

      - name: Download binaries (linux amd64 + arm64)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-download-binaries.sh "${RUNNER_TEMP}/binaries"

      - name: Push to bin branch (LFS)
        run: |
          set -euo pipefail
          STAGING="${RUNNER_TEMP}/binaries"
          BIN_REPO="${RUNNER_TEMP}/bin-repo"

          rm -rf "${BIN_REPO}"
          mkdir -p "${BIN_REPO}/linux-amd64" "${BIN_REPO}/linux-arm64"
          cp -f "${STAGING}/linux-amd64/"{kubectl,docker-compose,mc} "${BIN_REPO}/linux-amd64/"
          cp -f "${STAGING}/linux-arm64/"{kubectl,docker-compose,mc} "${BIN_REPO}/linux-arm64/"
          cp .gitattributes "${BIN_REPO}/"

          cd "${BIN_REPO}"
          git init
          git lfs install
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "sync: kubectl=${KUBE_VER} compose=${COMPOSE_VER} mc=${MC_VER}"
          git branch -M bin
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin bin

      - name: Update manifest on master
        run: |
          set -euo pipefail
          STAGING="${RUNNER_TEMP}/binaries"
          REPO="${{ github.repository }}"

          git checkout master
          git pull origin master

          VERSIONS=$(cat "${STAGING}/versions.json")
          python3 scripts/sync-binaries-manifest.py \
            config/binaries.manifest.json \
            "${STAGING}" \
            "${REPO}" \
            "${VERSIONS}"

          git add config/binaries.manifest.json
          git diff --cached --quiet || git commit -m "chore: update binaries manifest [skip ci]"
          git push origin master
