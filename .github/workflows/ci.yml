name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Shellcheck
        uses: koalaman/shellcheck-action@v0.9
        with:
          scandir: '.'
          severity: warning
          exclude: 'SC1091'

  script-syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          shopt -s globstar nullglob
          failed=0
          for f in \
            lib/*.sh \
            scripts/*.sh \
            packages/*/*.sh \
            install.sh uninstall.sh; do
            [[ -f "$f" ]] || continue
            echo "Checking $f"
            bash -n "$f" || failed=1
          done
          exit $failed

      - name: Check bin scripts syntax
        run: |
          failed=0
          for f in bin/*; do
            [[ -f "$f" ]] || continue
            echo "Checking $f"
            bash -n "$f" || failed=1
          done
          exit $failed
