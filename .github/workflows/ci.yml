name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: Run Shellcheck
        run: |
          set -euo pipefail
          mapfile -t scripts < <(
            {
              find lib scripts packages -type f -name '*.sh' 2>/dev/null || true
              find bin -type f 2>/dev/null || true
              find . -maxdepth 1 -type f -name '*.sh' 2>/dev/null || true
            } | sort -u
          )
          if [[ ${#scripts[@]} -eq 0 ]]; then
            echo "未找到 shell 脚本"
            exit 0
          fi
          shellcheck --external-sources --severity=warning "${scripts[@]}"

  script-syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          shopt -s globstar nullglob
          failed=0
          for f in \
            lib/*.sh \
            scripts/*.sh \
            packages/*/*.sh \
            install.sh uninstall.sh; do
            [[ -f "$f" ]] || continue
            echo "Checking $f"
            bash -n "$f" || failed=1
          done
          exit $failed

      - name: Check bin scripts syntax
        run: |
          failed=0
          for f in bin/*; do
            [[ -f "$f" ]] || continue
            echo "Checking $f"
            bash -n "$f" || failed=1
          done
          exit $failed
